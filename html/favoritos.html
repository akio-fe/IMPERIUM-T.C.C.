<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Favoritos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="/img/icone.ico">
  <style>
    :root {
      --bg-color: #111;
      --text-color: #eee;
      --highlight: #f1c40f;
      --sidebar-bg: #000;
      --sidebar-border: #222;
      --card-bg: #1c1c1c;
      --card-border: #333;
      --link-color: #aaa;
      --link-hover-bg: #1a1a1a;
      --checkbox-color: #f1c40f;
      --toggle-bg: #444;
      --toggle-circle: #ccc;
    }

    body.light {
      --bg-color: #fff;
      --text-color: #000;
      --highlight: #000;
      --sidebar-bg: #fafafa;
      --sidebar-border: #e0e0e0;
      --card-bg: #fff;
      --card-border: #ddd;
      --link-color: #555;
      --link-hover-bg: #f0f0f0;
      --checkbox-color: #000;
      --toggle-bg: #4DA3F1;
      --toggle-circle: #f5f5f5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      transition: background-color 0.3s, color 0.3s;
    }

    .sidebar {
      width: 240px;
      height: 100vh;
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      padding: 32px 20px;
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .profile {
      text-align: center;
      margin-bottom: 40px;
    }

    .profile img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      transition: filter 0.3s;
    }

    body:not(.light) .profile img {
      filter: brightness(0) invert(1);
    }

    .profile p {
      font-size: 1rem;
      color: var(--highlight);
      font-weight: 500;
      margin-top: 8px;
    }

    .sidebar nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .sidebar a {
      text-decoration: none;
      color: var(--link-color);
      font-size: 0.95rem;
      padding: 10px 12px;
      border-left: 4px solid transparent;
      transition: all 0.2s ease;
    }

    .sidebar a.active,
    .sidebar a:hover {
      color: var(--highlight);
      font-weight: 600;
      border-left: 4px solid var(--highlight);
      background-color: var(--link-hover-bg);
    }

    

    .main-content {
      margin-left: 240px;
      padding: 48px;
      width: 100%;
    }

    .main-content h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--highlight);
      margin-bottom: 32px;
    }

    .info-section {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 24px;
      flex: 1;
      min-width: 400px;
      color: var(--text-color);
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--highlight);
      margin-bottom: 16px;
    }

    .card p {
      font-size: 0.95rem;
      margin: 8px 0;
    }

    .card span {
      color: #888;
    }

    .edit-btn {
      margin-top: 16px;
      text-align: right;
    }

    .edit-btn button {
      background-color: transparent;
      color: var(--highlight);
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .product-list {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .product {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 16px;
      border-radius: 8px;
      width: 200px;
      text-align: center;
    }

    .product img {
      max-width: 100%;
      border-radius: 8px;
    }

    .product h3 {
      font-size: 1rem;
      margin-top: 12px;
      color: var(--highlight);
    }

    .product p {
      font-size: 0.9rem;
      margin: 8px 0;
    }

    .remove-button {
      background-color: transparent;
      border: 1px solid var(--highlight);
      color: var(--highlight);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="profile">
    <a href="../PRODUTOS.html"><img src="/img/aguia.png" alt="Imperium Logo" class="logo"></a>
      <p>Olá!</p>
    </div>
    <nav>
      <a href="perfil.php">Dados pessoais</a>
      <a href="enderecos.html">Endereços</a>
      <a href="pedidos.html">Pedidos</a>
      <a href="cartoes.html">Cartões</a>
      <a href="autenticacao.html">Autenticação</a>
      <a href="organizacao.html">Minha organização</a>
      <a href="favoritos.html" class="active">Favoritos</a>
      <a href="sair.html">Sair</a>
    </nav>
  </div>

  <div class="main-content">
    <h1>Favoritos</h1>
    <div class="product-list" id="favoritosContainer"></div>
  </div>

  <script>
  window.addEventListener('DOMContentLoaded', () => {
  const favoritosContainer = document.getElementById('favoritosContainer');
  let favoritos = JSON.parse(localStorage.getItem('favoritos')) || [];

  function renderFavoritos() {
    favoritosContainer.innerHTML = '';
    favoritos.forEach(produto => {
      const div = document.createElement('div');
      div.classList.add('product');
      div.innerHTML = `
        <a href="${produto.link}">
      <img src="../${produto.imagem}" alt="${produto.nome}" />
      </a><h3>${produto.nome}</h3>
    
        <p>R$${produto.preco}</p>
        <button class="remove-button" data-id="${produto.link}">Remover</button>
      `;
      favoritosContainer.appendChild(div);
    });
  }

  renderFavoritos();

  favoritosContainer.addEventListener('click', e => {
    if (e.target.classList.contains('remove-button')) {
      const id = e.target.getAttribute('data-id');
      favoritos = favoritos.filter(produto => produto.link !== id);
      localStorage.setItem('favoritos', JSON.stringify(favoritos));
      renderFavoritos();
    }
  });
});


  </script>
</body>
</html>
