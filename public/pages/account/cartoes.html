<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Cartões</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="/img/icone.ico">
  <style>
    :root {
      --bg-color: #111;
      --text-color: #eee;
      --highlight: #f1c40f;
      --sidebar-bg: #000;
      --sidebar-border: #222;
      --card-bg: #1c1c1c;
      --card-border: #333;
      --link-color: #aaa;
      --link-hover-bg: #1a1a1a;
      --checkbox-color: #f1c40f;
      --toggle-bg: #444;
      --toggle-circle: #ccc;
    }

    body.light {
      --bg-color: #fff;
      --text-color: #000;
      --highlight: #000;
      --sidebar-bg: #fafafa;
      --sidebar-border: #e0e0e0;
      --card-bg: #fff;
      --card-border: #ddd;
      --link-color: #555;
      --link-hover-bg: #f0f0f0;
      --checkbox-color: #000;
      --toggle-bg: #4DA3F1;
      --toggle-circle: #f5f5f5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      transition: background-color 0.3s, color 0.3s;
    }

    .sidebar {
      width: 240px;
      height: 100vh;
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      padding: 32px 20px;
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .profile {
      text-align: center;
      margin-bottom: 40px;
    }

    .profile img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      transition: filter 0.3s;
    }

    body:not(.light) .profile img {
      filter: brightness(0) invert(1);
    }

    .profile p {
      font-size: 1rem;
      color: var(--highlight);
      font-weight: 500;
      margin-top: 8px;
    }

    .sidebar nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .sidebar a {
      text-decoration: none;
      color: var(--link-color);
      font-size: 0.95rem;
      padding: 10px 12px;
      border-left: 4px solid transparent;
      transition: all 0.2s ease;
    }

    .sidebar a.active,
    .sidebar a:hover {
      color: var(--highlight);
      font-weight: 600;
      border-left: 4px solid var(--highlight);
      background-color: var(--link-hover-bg);
    }

    .main-content {
      margin-left: 240px;
      padding: 48px;
      width: 100%;
    }

    .main-content h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--highlight);
      margin-bottom: 32px;
    }

    .info-section {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 24px;
      flex: 1;
      min-width: 400px;
      color: var(--text-color);
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--highlight);
      margin-bottom: 16px;
    }

    .card p {
      font-size: 0.95rem;
      margin: 8px 0;
    }

    .card span {
      color: #888;
    }

    .edit-btn {
      margin-top: 16px;
      text-align: right;
    }

    .edit-btn button {
      background-color: transparent;
      color: var(--highlight);
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--checkbox-color);
    }

    label {
      font-size: 0.95rem;
    }

  

    .switch {
      position: relative;
      width: 50px;
      height: 28px;
      background-color: var(--toggle-bg);
      border-radius: 20px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .switch::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background-color: var(--toggle-circle);
      top: 3px;
      left: 3px;
      transition: transform 0.3s ease;
    }

    body.light .switch::before {
      transform: translateX(22px);
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="profile">
      <img src="../perfil.png" alt="Perfil" />
      <p>Olá!</p>
    </div>
    <nav>
      <a href="perfil.php">Dados pessoais</a>
      <a href="enderecos.html">Endereços</a>
      <a href="pedidos.php">Pedidos</a>
      <a href="cartoes.html" class="active">Cartões</a>
      <a href="autenticacao.html">Autenticação</a>
      <a href="organizacao.html">Minha organização</a>
      <a href="favoritos.html">Favoritos</a>
      <a href="sair.html">Sair</a>
    </nav>
  </div>

  <div class="main-content">
    <h1>Cartões</h1>
    
    </div>


  <script>
    // Aplica o tema salvo ao carregar a página
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark');
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
      const theme = document.body.classList.contains('dark') ? 'dark' : 'light';
      localStorage.setItem('theme', theme);
    }
  </script>
  <script>
    // Aplica o tema salvo ao carregar a página
    window.addEventListener('DOMContentLoaded', () => {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.body.classList.add('light');
      }
    });
  </script>
  
</body>
</html>
